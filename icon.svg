<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#1a2a4a"/>
      <stop offset="60%"  stop-color="#0F1B33"/>
      <stop offset="100%" stop-color="#070d1c"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- ornamental D in gold -->
  <g transform="translate(256 264)" fill="none" stroke="#D4AF6F" stroke-width="22" stroke-linecap="butt">
    <path d="M -90 -120 L -90 120 L 30 120 C 110 120 150 60 150 0 C 150 -60 110 -120 30 -120 Z"/>
  </g>
  <!-- inner cream tint to lighten the bowl -->
  <g transform="translate(256 264)" fill="#F1E5C7" opacity="0.06">
    <path d="M -68 -100 L -68 100 L 28 100 C 92 100 128 50 128 0 C 128 -50 92 -100 28 -100 Z"/>
  </g>
  <!-- five-point star ornament -->
  <g transform="translate(384 138)" fill="#D97862">
    <path d="M0 -38 L11 -12 L38 -12 L16 5 L25 32 L0 16 L-25 32 L-16 5 L-38 -12 L-11 -12 Z"/>
  </g>
  <!-- small star bottom-left -->
  <g transform="translate(120 388) scale(0.6)" fill="#F1E5C7" opacity="0.85">
    <path d="M0 -38 L11 -12 L38 -12 L16 5 L25 32 L0 16 L-25 32 L-16 5 L-38 -12 L-11 -12 Z"/>
  </g>
</svg>
